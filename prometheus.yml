# Prometheus监控配置
global:
  scrape_interval: 15s
  evaluation_interval: 15s

# 告警规则
# rule_files:
#   - "alerts.yml"

scrape_configs:
  # 监控mPower_Rag API
  - job_name: 'mpower-rag-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # 监控Qdrant
  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant:6333']
    metrics_path: '/metrics'
    scrape_interval: 15s
