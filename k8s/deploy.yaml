# mPower_Rag Kubernetes 部署配置
# 包含 Deployment, Service, ConfigMap, Secret, HPA

---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: mpower-rag
  labels:
    app: mpower-rag

---
# ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: mpower-rag-config
  namespace: mpower-rag
data:
  # 应用配置
  API_HOST: "0.0.0.0"
  API_PORT: "8000"
  LOG_LEVEL: "INFO"
  DEBUG: "false"
  
  # Qdrant 配置
  QDRANT_HOST: "qdrant-service"
  QDRANT_PORT: "6333"
  QDRANT_COLLECTION: "vehicle_test_knowledge"
  
  # LLM 配置
  LLM_PROVIDER: "deepseek"
  LLM_MODEL: "deepseek-chat"
  LLM_BASE_URL: "https://api.deepseek.com"
  
  # 缓存配置
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  CACHE_ENABLED: "true"
  CACHE_TTL: "3600"
  
  # 安全配置
  API_AUTH_ENABLED: "true"
  CORS_ORIGINS: "https://your-domain.com"
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_REQUESTS_PER_MINUTE: "60"
  RATE_LIMIT_BURST_SIZE: "10"
  
  # 监控配置
  PROMETHEUS_ENABLED: "true"

---
# Secret (敏感信息)
apiVersion: v1
kind: Secret
metadata:
  name: mpower-rag-secrets
  namespace: mpower-rag
type: Opaque
stringData:
  # LLM API Key (必须设置)
  LLM_API_KEY: "your-deepseek-api-key-here"
  
  # API Keys (逗号分隔)
  API_KEYS: "mpower_prod_key_1,mpower_prod_key_2"
  ADMIN_API_KEYS: "mpower_admin_key_1"
  
  # Redis 密码
  REDIS_PASSWORD: ""
  
  # Qdrant API Key (如果需要)
  QDRANT_API_KEY: ""

---
# Qdrant Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  namespace: mpower-rag
  labels:
    app: qdrant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
      - name: qdrant
        image: qdrant/qdrant:latest
        ports:
        - containerPort: 6333
          name: http
        - containerPort: 6334
          name: grpc
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "4Gi"
            cpu: "2"
        volumeMounts:
        - name: qdrant-storage
          mountPath: /qdrant/storage
        livenessProbe:
          httpGet:
            path: /
            port: 6333
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 6333
          initialDelaySeconds: 5
          periodSeconds: 5
      volumes:
      - name: qdrant-storage
        persistentVolumeClaim:
          claimName: qdrant-pvc

---
# Qdrant Service
apiVersion: v1
kind: Service
metadata:
  name: qdrant-service
  namespace: mpower-rag
spec:
  selector:
    app: qdrant
  ports:
  - port: 6333
    targetPort: 6333
    name: http
  - port: 6334
    targetPort: 6334
    name: grpc
  type: ClusterIP

---
# Redis Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: mpower-rag
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        command:
        - redis-server
        - --appendonly
        - "yes"
        livenessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 2
          periodSeconds: 2

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: mpower-rag
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
  type: ClusterIP

---
# mPower_Rag API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mpower-rag-api
  namespace: mpower-rag
  labels:
    app: mpower-rag-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mpower-rag-api
  template:
    metadata:
      labels:
        app: mpower-rag-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: api
        image: ghcr.io/zhang57zhang/mpower-rag:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
        envFrom:
        - configMapRef:
            name: mpower-rag-config
        - secretRef:
            name: mpower-rag-secrets
        resources:
          requests:
            memory: "2Gi"
            cpu: "1"
          limits:
            memory: "4Gi"
            cpu: "2"
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: knowledge-base
          mountPath: /app/knowledge_base
      volumes:
      - name: knowledge-base
        persistentVolumeClaim:
          claimName: knowledge-base-pvc
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - mpower-rag-api
              topologyKey: kubernetes.io/hostname

---
# API Service
apiVersion: v1
kind: Service
metadata:
  name: mpower-rag-api-service
  namespace: mpower-rag
spec:
  selector:
    app: mpower-rag-api
  ports:
  - port: 80
    targetPort: 8000
    name: http
  type: ClusterIP

---
# Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mpower-rag-ingress
  namespace: mpower-rag
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.your-domain.com
    secretName: mpower-rag-tls
  rules:
  - host: api.your-domain.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mpower-rag-api-service
            port:
              number: 80

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mpower-rag-hpa
  namespace: mpower-rag
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mpower-rag-api
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Pods
        value: 2
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60

---
# Pod Disruption Budget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mpower-rag-pdb
  namespace: mpower-rag
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: mpower-rag-api

---
# Persistent Volume Claims
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-pvc
  namespace: mpower-rag
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: knowledge-base-pvc
  namespace: mpower-rag
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
